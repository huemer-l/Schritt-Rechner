<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laufband Schritt-Rechner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 650px;
            margin: 0 auto;
        }
        h2, h3 { color: #2c3e50; }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .segment {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        label { font-weight: bold; font-size: 0.9em; }
        input {
            width: 80px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { background-color: #2980b9; }
        .btn-remove {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 0.8em;
        }
        .btn-remove:hover { background-color: #c0392b; }
        .btn-calculate {
            background-color: #2ecc71;
            width: 100%;
            font-size: 1.2em;
            margin-top: 10px;
            padding: 15px;
        }
        .btn-calculate:hover { background-color: #27ae60; }
        #result-box {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 20px;
            padding: 15px;
            background-color: #eaf2f8;
            border-radius: 5px;
        }
        .formula-info {
            font-size: 0.9em;
            color: #444;
            background: #eaf2f8;
            padding: 10px;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .method-selector { margin-bottom: 15px; }
        .radio-group { display: flex; gap: 20px; margin-top: 10px; }
        #exponential-settings {
            display: none;
            background: #fdfefe;
            border: 1px dashed #ccc;
            padding: 15px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h2>🏃 Laufband Schritt-Rechner</h2>

    <div class="card">
        <h3>1. Berechnungsmethode wählen</h3>
        
        <div class="method-selector">
            <div class="radio-group">
                <label>
                    <input type="radio" name="calcMethod" value="poly" checked onchange="toggleMethod()"> 
                    Standard (Dein Polynom)
                </label>
                <label>
                    <input type="radio" name="calcMethod" value="expo" onchange="toggleMethod()"> 
                    Manuell (Exponential)
                </label>
            </div>
        </div>

        <div id="poly-info" class="formula-info">
            <strong>Verwendete Formel (Schritte pro km):</strong><br>
            y = -17,219x³ + 346,42x² - 2303,9x + 6268,3<br>
            <em>(x = Geschwindigkeit in km/h)</em>
        </div>

        <div id="exponential-settings">
            <p class="formula-info">Formel: <strong>Schritte pro km = A × e^(B × km/h)</strong></p>
            <div>
                <label>Höhe (A): <input type="text" id="paramA" value="1500"></label>
                <label style="margin-left: 15px;">Vorfaktor (B): <input type="text" id="paramB" value="-0.05"></label>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>2. Deine Trainings-Segmente</h3>
        <div id="segment-container">
            <div class="segment">
                <div>
                    <label>Distanz (m): </label>
                    <input type="text" class="dist-input" value="800">
                </div>
                <div>
                    <label>Geschwindigkeit (km/h): </label>
                    <input type="text" class="speed-input" value="3.5">
                </div>
            </div>
        </div>
        
        <button type="button" onclick="addSegment()">+ Weiteres Segment hinzufügen</button>
    </div>

    <div class="card">
        <button class="btn-calculate" onclick="calculateSteps()">Gesamtschritte Berechnen</button>
        <div id="result-box">
            Gesamtschritte: <span id="total-steps">0</span>
        </div>
    </div>

    <script>
        function toggleMethod() {
            const method = document.querySelector('input[name="calcMethod"]:checked').value;
            document.getElementById('exponential-settings').style.display = (method === 'expo') ? 'block' : 'none';
            document.getElementById('poly-info').style.display = (method === 'poly') ? 'block' : 'none';
        }

        function addSegment() {
            const container = document.getElementById('segment-container');
            const segmentDiv = document.createElement('div');
            segmentDiv.className = 'segment';
            segmentDiv.innerHTML = `
                <div>
                    <label>Distanz (m): </label>
                    <input type="text" class="dist-input" value="1000">
                </div>
                <div>
                    <label>Geschwindigkeit (km/h): </label>
                    <input type="text" class="speed-input" value="5.0">
                </div>
                <button class="btn-remove" onclick="this.parentElement.remove()">X Entfernen</button>
            `;
            container.appendChild(segmentDiv);
        }

        // Hilfsfunktion: Wandelt Eingaben sicher in Zahlen um (z.B. "3,5" zu 3.5)
        function parseSicher(wert) {
            if (!wert) return 0;
            return parseFloat(wert.replace(',', '.')) || 0;
        }

        function calculateSteps() {
            const method = document.querySelector('input[name="calcMethod"]:checked').value;
            const segments = document.querySelectorAll('.segment');
            let totalSteps = 0;

            segments.forEach(segment => {
                // Werte sicher auslesen
                const distInMeters = parseSicher(segment.querySelector('.dist-input').value);
                const speed = parseSicher(segment.querySelector('.speed-input').value);
                
                if (distInMeters === 0 || speed === 0) return; // Überspringen, wenn nichts eingetragen ist

                const distInKm = distInMeters / 1000;
                let stepsPerKm = 0;

                if (method === 'poly') {
                    // Deine Polynomfunktion
                    stepsPerKm = 
                        (-17.219 * Math.pow(speed, 3)) + 
                        (346.42 * Math.pow(speed, 2)) - 
                        (2303.9 * speed) + 
                        6268.3;
                } else {
                    // Exponentialfunktion
                    const A = parseSicher(document.getElementById('paramA').value);
                    const B = parseSicher(document.getElementById('paramB').value);
                    stepsPerKm = A * Math.exp(B * speed);
                }
                
                // Endgültige Schritte für dieses Segment berechnen
                const segmentSteps = distInKm * stepsPerKm;
                
                if (segmentSteps > 0) {
                    totalSteps += segmentSteps;
                }
            });

            // Ergebnis anzeigen
            if (totalSteps > 0) {
                document.getElementById('total-steps').innerText = Math.round(totalSteps).toLocaleString('de-DE');
            } else {
                document.getElementById('total-steps').innerText = "0 (Bitte Werte prüfen)";
            }
        }
    </script>
</body>
</html>
