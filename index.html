<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laufband Schritt-Rechner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 650px;
            margin: 0 auto;
        }
        h2, h3 { color: #2c3e50; }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .segment {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        label { font-weight: bold; font-size: 0.9em; display: flex; flex-direction: column; }
        input[type="text"] {
            width: 90px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-top: 5px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { background-color: #2980b9; }
        .btn-remove { background-color: #e74c3c; padding: 8px 12px; font-size: 0.9em; margin-top: 20px;}
        .btn-remove:hover { background-color: #c0392b; }
        .btn-calculate {
            background-color: #2ecc71;
            width: 100%;
            font-size: 1.2em;
            margin-top: 10px;
            padding: 15px;
        }
        .btn-calculate:hover { background-color: #27ae60; }
        #result-box {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 20px;
            padding: 15px;
            background-color: #eaf2f8;
            border-radius: 5px;
        }
        .formula-info {
            font-size: 0.9em;
            color: #444;
            background: #eaf2f8;
            padding: 10px;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; }
        
        .settings-panel {
            background: #fdfefe;
            border: 1px dashed #ccc;
            padding: 15px;
            border-radius: 5px;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }
        #exponential-settings { display: none; }
    </style>
</head>
<body>

    <h2>🏃 Laufband Schritt-Rechner</h2>

    <div class="card">
        <h3>1. Berechnungsmethode wählen</h3>
        
        <div class="radio-group">
            <label style="flex-direction: row; align-items: center; gap: 5px;">
                <input type="radio" name="calcMethod" value="poly" checked onchange="toggleMethod()"> 
                Polynomfunktion (Standard)
            </label>
            <label style="flex-direction: row; align-items: center; gap: 5px;">
                <input type="radio" name="calcMethod" value="expo" onchange="toggleMethod()"> 
                Exponentialfunktion
            </label>
        </div>

        <div id="poly-settings" class="settings-panel">
            <p class="formula-info">Formel (Schritte pro km): <strong>y = ax³ + bx² + cx + d</strong><br><em>(x = km/h)</em></p>
            <div class="input-grid">
                <label>Wert a: <input type="text" id="polyA" value="-17.219"></label>
                <label>Wert b: <input type="text" id="polyB" value="346.42"></label>
                <label>Wert c: <input type="text" id="polyC" value="-2303.9"></label>
                <label>Wert d: <input type="text" id="polyD" value="6268.3"></label>
            </div>
        </div>

        <div id="exponential-settings" class="settings-panel">
            <p class="formula-info">Formel (Schritte pro km): <strong>y = A × e^(B × x)</strong><br><em>(x = km/h)</em></p>
            <div class="input-grid">
                <label>Höhe (A): <input type="text" id="paramA" value="1500"></label>
                <label>Vorfaktor (B): <input type="text" id="paramB" value="-0.05"></label>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>2. Deine Trainings-Segmente</h3>
        <div id="segment-container">
            <div class="segment">
                <label>Distanz (m): <input type="text" class="dist-input" value="800"></label>
                <label>Geschwindigkeit (km/h): <input type="text" class="speed-input" value="3.5"></label>
            </div>
        </div>
        
        <button type="button" onclick="addSegment()">+ Weiteres Segment hinzufügen</button>
    </div>

    <div class="card">
        <button class="btn-calculate" onclick="calculateSteps()">Gesamtschritte Berechnen</button>
        <div id="result-box">
            Gesamtschritte: <span id="total-steps">0</span>
        </div>
    </div>

    <script>
        // Wechselt zwischen den Eingabefeldern für die Formeln
        function toggleMethod() {
            const method = document.querySelector('input[name="calcMethod"]:checked').value;
            document.getElementById('poly-settings').style.display = (method === 'poly') ? 'block' : 'none';
            document.getElementById('exponential-settings').style.display = (method === 'expo') ? 'block' : 'none';
        }

        // Fügt ein neues Segment hinzu
        function addSegment() {
            const container = document.getElementById('segment-container');
            const segmentDiv = document.createElement('div');
            segmentDiv.className = 'segment';
            segmentDiv.innerHTML = `
                <label>Distanz (m): <input type="text" class="dist-input" value="1000"></label>
                <label>Geschwindigkeit (km/h): <input type="text" class="speed-input" value="5.0"></label>
                <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(segmentDiv);
        }

        // Hilfsfunktion: Macht aus Kommas Punkte und fängt leere Felder sicher ab
        function parseSicher(wert) {
            if (!wert) return 0;
            // Wandelt den Wert in einen String um, tauscht Komma gegen Punkt und macht eine Zahl daraus
            return parseFloat(wert.toString().replace(',', '.')) || 0;
        }

        // Die Hauptberechnung
        function calculateSteps() {
            const method = document.querySelector('input[name="calcMethod"]:checked').value;
            const segments = document.querySelectorAll('.segment');
            let totalSteps = 0;

            segments.forEach(segment => {
                const distInMeters = parseSicher(segment.querySelector('.dist-input').value);
                const speed = parseSicher(segment.querySelector('.speed-input').value);
                
                // Wenn nichts Sinnvolles eingetragen wurde, ignoriere dieses Segment
                if (distInMeters <= 0 || speed <= 0) return;

                const distInKm = distInMeters / 1000;
                let stepsPerKm = 0;

                if (method === 'poly') {
                    // Werte aus den eigenen Polynom-Feldern holen
                    const a = parseSicher(document.getElementById('polyA').value);
                    const b = parseSicher(document.getElementById('polyB').value);
                    const c = parseSicher(document.getElementById('polyC').value);
                    const d = parseSicher(document.getElementById('polyD').value);
                    
                    // Polynomfunktion: ax^3 + bx^2 + cx + d
                    stepsPerKm = 
                        (a * Math.pow(speed, 3)) + 
                        (b * Math.pow(speed, 2)) + 
                        (c * speed) + 
                        d;
                } else {
                    // Werte aus den Exponential-Feldern holen
                    const A = parseSicher(document.getElementById('paramA').value);
                    const B = parseSicher(document.getElementById('paramB').value);
                    
                    // Exponentialfunktion: A * e^(B * speed)
                    stepsPerKm = A * Math.exp(B * speed);
                }
                
                const segmentSteps = distInKm * stepsPerKm;
                
                // Nur positive Werte aufaddieren
                if (segmentSteps > 0) {
                    totalSteps += segmentSteps;
                }
            });

            // Ausgabe aktualisieren
            const outputElement = document.getElementById('total-steps');
            if (totalSteps > 0) {
                // toLocaleString macht Tausendertrennpunkte rein (z.B. 1.250)
                outputElement.innerText = Math.round(totalSteps).toLocaleString('de-DE');
            } else {
                outputElement.innerText = "0 (Überprüfe deine Eingaben!)";
            }
        }
    </script>
</body>
</html>
