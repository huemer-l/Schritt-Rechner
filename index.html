<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laufband Schritt-Rechner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 650px;
            margin: 0 auto;
        }
        h2, h3 { color: #2c3e50; }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .segment {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        label { font-weight: bold; font-size: 0.9em; display: flex; flex-direction: column; }
        input[type="text"] {
            width: 90px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-top: 5px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { background-color: #2980b9; }
        .btn-remove { background-color: #e74c3c; padding: 8px 12px; font-size: 0.9em; margin-top: 20px;}
        .btn-remove:hover { background-color: #c0392b; }
        .btn-calculate {
            background-color: #2ecc71;
            width: 100%;
            font-size: 1.2em;
            margin-top: 10px;
            padding: 15px;
            font-weight: bold;
        }
        .btn-calculate:hover { background-color: #27ae60; }
        #result-box {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 20px;
            padding: 15px;
            background-color: #eaf2f8;
            border-radius: 5px;
        }
        .formula-info {
            font-size: 0.9em;
            color: #444;
            background: #eaf2f8;
            padding: 10px;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; }
        
        .settings-panel {
            background: #fdfefe;
            border: 1px dashed #ccc;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }
        #custom-poly-settings { display: none; }
    </style>
</head>
<body>

    <h2>🏃 Laufband Schritt-Rechner</h2>

    <div class="card">
        <h3>1. Berechnungsmethode wählen</h3>
        
        <div class="radio-group">
            <label style="flex-direction: row; align-items: center; gap: 5px;">
                <input type="radio" name="calcMethod" value="fixed_poly" checked onchange="toggleMethod()"> 
                Standard (Feste Formel)
            </label>
            <label style="flex-direction: row; align-items: center; gap: 5px;">
                <input type="radio" name="calcMethod" value="custom_poly" onchange="toggleMethod()"> 
                Manuelles Polynom
            </label>
        </div>

        <div id="fixed-poly-info" class="formula-info">
            <strong>Feste Standard-Formel (Schritte pro km):</strong><br>
            y = -17,219x³ + 346,42x² - 2303,9x + 6268,3<br>
            <em>(x = Geschwindigkeit in km/h)</em>
        </div>

        <div id="custom-poly-settings" class="settings-panel">
            <p class="formula-info">Eigene Formel: <strong>y = a·x³ + b·x² + c·x + d</strong></p>
            <div class="input-grid">
                <label>Wert a: <input type="text" id="customA" value="0"></label>
                <label>Wert b: <input type="text" id="customB" value="0"></label>
                <label>Wert c: <input type="text" id="customC" value="0"></label>
                <label>Wert d: <input type="text" id="customD" value="0"></label>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>2. Deine Trainings-Segmente</h3>
        <div id="segment-container">
            <div class="segment">
                <label>Distanz (m): <input type="text" class="dist-input" value="800"></label>
                <label>Geschwindigkeit (km/h): <input type="text" class="speed-input" value="3.5"></label>
            </div>
        </div>
        
        <button type="button" onclick="addSegment()">+ Weiteres Segment hinzufügen</button>
    </div>

    <div class="card">
        <button class="btn-calculate" onclick="calculateSteps()">Gesamtschritte Berechnen</button>
        <div id="result-box">
            Gesamtschritte: <span id="total-steps">0</span>
        </div>
    </div>

    <script>
        // Wechselt zwischen festem und manuellem Polynom
        function toggleMethod() {
            const methodEl = document.querySelector('input[name="calcMethod"]:checked');
            if (!methodEl) return;
            
            if (methodEl.value === 'fixed_poly' || methodEl.value === 'poly') {
                document.getElementById('fixed-poly-info').style.display = 'block';
                document.getElementById('custom-poly-settings').style.display = 'none';
            } else {
                document.getElementById('fixed-poly-info').style.display = 'none';
                document.getElementById('custom-poly-settings').style.display = 'block';
            }
        }

        // Fügt ein neues Trainings-Segment hinzu
        function addSegment() {
            const container = document.getElementById('segment-container');
            const segmentDiv = document.createElement('div');
            segmentDiv.className = 'segment';
            segmentDiv.innerHTML = `
                <label>Distanz (m): <input type="text" class="dist-input" value="1000"></label>
                <label>Geschwindigkeit (km/h): <input type="text" class="speed-input" value="5.0"></label>
                <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(segmentDiv);
        }

        // Hauptfunktion zur Berechnung
        function calculateSteps() {
            try {
                // Fängt den Fall ab, falls alte HTML-Radiobuttons geladen wurden
                const methodElement = document.querySelector('input[name="calcMethod"]:checked');
                const method = methodElement ? methodElement.value : 'fixed_poly';
                
                const segments = document.querySelectorAll('.segment');
                let totalSteps = 0;

                for (let i = 0; i < segments.length; i++) {
                    const segment = segments[i];
                    
                    const distInput = segment.querySelector('.dist-input');
                    const speedInput = segment.querySelector('.speed-input');
                    
                    if (!distInput || !speedInput) continue; // Wenn Felder fehlen, überspringen
                    
                    const distInMeters = parseFloat(distInput.value.replace(',', '.')) || 0;
                    const speed = parseFloat(speedInput.value.replace(',', '.')) || 0;
                    
                    if (distInMeters <= 0 || speed <= 0) continue; 

                    const distInKm = distInMeters / 1000;
                    let a = 0, b = 0, c = 0, d = 0;

                    if (method === 'fixed_poly' || method === 'poly') { // "poly" fängt alte Versionen ab
                        a = -17.219;
                        b = 346.42;
                        c = -2303.9;
                        d = 6268.3;
                    } else {
                        const elA = document.getElementById('customA');
                        const elB = document.getElementById('customB');
                        const elC = document.getElementById('customC');
                        const elD = document.getElementById('customD');
                        
                        // Wenn die neuen HTML-Felder fehlen, melde den Fehler eindeutig
                        if (!elA || !elB || !elC || !elD) {
                            throw new Error("Bitte lösche einmal den gesamten Code in GitHub (Strg+A) und kopiere ihn komplett neu. HTML und Skript passen nicht zusammen.");
                        }

                        a = parseFloat(elA.value.replace(',', '.')) || 0;
                        b = parseFloat(elB.value.replace(',', '.')) || 0;
                        c = parseFloat(elC.value.replace(',', '.')) || 0;
                        d = parseFloat(elD.value.replace(',', '.')) || 0;
                    }
                    
                    const stepsPerKm = (a * Math.pow(speed, 3)) + (b * Math.pow(speed, 2)) + (c * speed) + d;
                    const segmentSteps = distInKm * stepsPerKm;
                    
                    if (segmentSteps > 0) {
                        totalSteps += segmentSteps;
                    }
                }

                if (totalSteps > 0) {
                    document.getElementById('total-steps').innerText = Math.round(totalSteps).toLocaleString('de-DE');
                } else {
                    document.getElementById('total-steps').innerText = "0 (Eingaben prüfen)";
                }

            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>
</html>
